<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Taller 5 - BULMA CSS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>

  <body>
  <section class="section">
    <div class="container">
        <div class="columns is-centered">
            <div class="column is-7-desktop">
                <div class="field is-horizontal">
                    <div class="field-label is-normal">
                        <label class="label">De</label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <div class="control has-icons-left">
                                <input class="input" type="text" placeholder="Nombre">
                                <span class="icon is-small is-left">
                                    <i class="fa-solid fa-user"></i>
                                </span>
                            </div>
                        </div>
                        <div class="field">
                            <div class="control has-icons-left has-icons-right">
                                <input class="input" type="text" placeholder="Correo">
                                <span class="icon is-small is-left">
                                    <i class="fa-solid fa-envelope"></i>
                                </span>
                                <span class="icon is-small is-right">
                                    <i class="fa-solid fa-check"></i>
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="field is-horizontal">
                    <div class="field-label"></div>
                    <div class="field-body">
                        <div class="field">
                            <div class="field has-addons">
                                <p class="control">
                                    <a class="button is-static">
                                    +56
                                    </a>
                                </p>
                                <p class="control is-expanded">
                                    <input class="input" type="text" placeholder="Tu numero de telefono">
                                </p>
                            </div>
                            <p class="help">No incluyas el primer cero</p>
                        </div>
                    </div>
                </div>
                <div class="field is-horizontal">
                    <div class="field-label is-normal">
                        <label class="label">Departamento</label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <div class="control">
                            <div class="select">
                                <select>
                                <option>Desarrollo de negocios</option>
                                <option>With options</option>
                                </select>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="field is-horizontal">
                    <div class="field-label is-normal">
                        <label class="label">¿Ya eres miembro?</label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <div class="control">
                            <label class="radio">
                                <input type="radio" name="answer" />
                                Sí
                            </label>
                            <label class="radio">
                                <input type="radio" name="answer" />
                                No
                            </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="field is-horizontal">
                    <div class="field-label is-normal">
                        <label class="label">Asunto</label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <div class="control">
                            <input class="input is-danger" type="text" placeholder="Ejemplo: Oportunidad de colaboración">
                            </div>
                            <p class="help is-danger">
                            Este campo es obligatorio
                            </p>
                        </div>
                    </div>
                </div>

                <div class="field is-horizontal">
                    <div class="field-label is-normal">
                        <label class="label">Pregunta</label>
                    </div>
                    <div class="field-body">
                        <div class="field">
                            <div class="control">
                            <textarea class="textarea" placeholder="Explica como podemos ayudarte"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="field is-horizontal">
                    <div class="field-label is-normal"></div>
                    <div class="field-body">
                        <div class="field">
                        <div class="control">
                            <button class="button is-primary">Enviar mensaje</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
  </section>
  </body>
</html>
